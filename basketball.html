<!DOCTYPE html>
<html>
<head>
  <title>Basketball Game</title>
  <style>
    canvas {
      background: lightblue;
      display: block;
      margin: auto;
    }
  </style>
</head>
<body>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Player
let player = {
  x: 100,
  y: 300,
  width: 30,
  height: 50,
  dy: 0,
  jumping: false
};

// Ball
let ball = {
  x: 300,
  y: 100,
  radius: 15,
  dy: 2
};

function drawPlayer() {
  ctx.fillStyle = "red";
  ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
}

// Gravity
function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player gravity
  player.y += player.dy;
  player.dy += 0.5;

  if (player.y > 300) {
    player.y = 300;
    player.dy = 0;
    player.jumping = false;
  }

  // Ball gravity
  ball.y += ball.dy;
  ball.dy += 0.3;

  if (ball.y > 380) {
    ball.y = 380;
    ball.dy *= -0.8;
  }

  drawPlayer();
  drawBall();

  requestAnimationFrame(update);
}

// Jump
document.addEventListener("keydown", () => {
  if (!player.jumping) {
    player.dy = -10;
    player.jumping = true;
  }
});

update();
</script>

</body>
</html>
