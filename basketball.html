<!DOCTYPE html>
<html>
<head>
  <title>Basketball Random</title>
  <style>
    body {
      text-align: center;
      background: #222;
      color: white;
    }

    canvas {
      background: #87CEEB;
      display: block;
      margin: auto;
      border: 3px solid white;
    }
  </style>
</head>
<body>

<h1>🏀 Basketball Game 🏀</h1>
<p>Player 1: W key | Player 2: ↑ Arrow</p>

<canvas id="game" width="700" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Players
let p1 = { x: 100, y: 300, w: 30, h: 50, dy: 0, jumping: false };
let p2 = { x: 550, y: 300, w: 30, h: 50, dy: 0, jumping: false };

// Ball
let ball = { x: 350, y: 100, r: 15, dx: 3, dy: 2 };

// Hoops
let hoop1 = { x: 20, y: 200, w: 10, h: 80 };
let hoop2 = { x: 670, y: 200, w: 10, h: 80 };

// Scores
let score1 = 0;
let score2 = 0;

function drawRect(obj, color) {
  ctx.fillStyle = color;
  ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = "orange";
  ctx.fill();
}

function drawText() {
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText(score1, 200, 50);
  ctx.fillText(score2, 500, 50);
}

function resetBall() {
  ball.x = 350;
  ball.y = 100;
  ball.dx = (Math.random() > 0.5 ? 3 : -3);
  ball.dy = 2;
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Gravity
  [p1, p2].forEach(p => {
    p.y += p.dy;
    p.dy += 0.5;

    if (p.y > 300) {
      p.y = 300;
      p.dy = 0;
      p.jumping = false;
    }
  });

  // Ball movement
  ball.x += ball.dx;
  ball.y += ball.dy;
  ball.dy += 0.3;

  // Bounce walls
  if (ball.x < 0 || ball.x > canvas.width) ball.dx *= -1;
  if (ball.y > 380) {
    ball.y = 380;
    ball.dy *= -0.8;
  }

  // Score check
  if (ball.x < 30 && ball.y > 200) {
    score2++;
    resetBall();
  }
  if (ball.x > 670 && ball.y > 200) {
    score1++;
    resetBall();
  }

  // Draw everything
  drawRect(p1, "red");
  drawRect(p2, "blue");
  drawRect(hoop1, "white");
  drawRect(hoop2, "white");
  drawBall();
  drawText();

  requestAnimationFrame(update);
}

// Controls
document.addEventListener("keydown", (e) => {
  if (e.key === "w" && !p1.jumping) {
    p1.dy = -10;
    p1.jumping = true;
  }

  if (e.key === "ArrowUp" && !p2.jumping) {
    p2.dy = -10;
    p2.jumping = true;
  }
});

update();
</script>

</body>
</html>
